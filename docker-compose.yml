services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-foo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bar}
      POSTGRES_DB: ${DB_NAME:-test_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - traefik-network

  backend:
    labels:
      - "traefik.enable=true"

      # /api を backend にルーティング
      - "traefik.http.routers.backend.rule=Host(`tsunagari.minagiri.net`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"

      - "traefik.http.services.backend.loadbalancer.server.port=3000"
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    networks:
      - traefik-network
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-foo}
      DB_PASSWORD: ${DB_PASSWORD:-bar}
      DB_NAME: ${DB_NAME:-test_db}
      NODE_ENV: production
      DEV_API_ENABLED: "false"
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_PUBLIC_APP_ORIGIN: ${VITE_PUBLIC_APP_ORIGIN:-https://localhost}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    networks:
      - traefik-network
    restart: unless-stopped
    depends_on:
      - backend

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`tsunagari.minagiri.net`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      -  "traefik.docker.network=traefik-network"
    

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  traefik-network:
    name: traefik-network
    external: true